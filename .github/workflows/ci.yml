name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
        env:
          # Build doesn't need keys, but this stops Next from warning that
          # they're absent.
          AI_GATEWAY_API_KEY: ci-stub
          OTI_EMBEDDING_MODEL: voyage/voyage-3-large
          OTI_EMBEDDING_DIMENSIONS: "1024"
